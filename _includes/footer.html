<footer class="site-footer">
  <hr class="slender">
  <ul class="footer-links">
    {% for entry in site.data.social %}
      <li>
        <a href="{{ entry.link }}" target="_blank" rel="noopener">
          <span class="{{ entry.icon }}"></span>
        </a>
      </li>
    {% endfor %}
  </ul>
  <div class="credits">
    <span>&copy; {{ site.time | date: '%Y' }} &nbsp;&nbsp;{{ site.author | upcase }}</span>
  </div>
</footer>
