<!--- Header and nav template site-wide -->
<header>
    <nav class="group">
        <div class="site-branding">
            <a href="{{site.baseurl}}/">
                <img
                    class="badge"
                    src="{{site.baseurl}}/assets/img/badge_1.png"
                    alt="CH"
                />
                <span class="site-title">failosophy</span>
            </a>
        </div>
        <div class="nav-links">
            {% for node in site.pages %} {% unless node.nav_exclude %} {% if page.url
            == node.url %}
            <a
                class="active"
                href="{{node.url | prepend: site.baseurl}}"
                class="active"
                >{{node.title}}</a
            >
            {% else %}
            <a href="{{node.url | prepend: site.baseurl}}">{{node.title}}</a>
            {% endif %} {% endunless %} {% endfor %}
        </div>
    </nav>
</header>
